name: Backend Python Contracts

on:
  pull_request:
    paths:
      - "ai/**"
      - ".github/workflows/backend-python-contracts.yml"
  push:
    branches:
      - main
    paths:
      - "ai/**"
      - ".github/workflows/backend-python-contracts.yml"

jobs:
  backend-contracts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          grep -v '^tensorflow' ai/requirements.txt > /tmp/requirements-ci.txt
          python -m pip install -r /tmp/requirements-ci.txt

      - name: Run backend contract tests
        run: |
          pytest -q \
            ai/python/__tests__/agui/test_agui_actions_intents.py \
            ai/python/__tests__/agui/test_agui_stream.py \
            ai/python/__tests__/server/test_server_ml.py \
            ai/ml/__tests__/frameworks/test_pytorch_handlers.py \
            ai/ml/__tests__/frameworks/test_tensorflow_handlers.py \
            ai/ml/__tests__/core/test_request_prep.py \
            ai/ml/__tests__/core/test_execution.py \
            ai/ml/__tests__/core/test_artifacts.py
